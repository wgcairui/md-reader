name: build-android

# Trigger on:
#   - push to main          → CI build (artifact only, no release)
#   - tag v*                → release build (upload APK to GitHub Releases)
#   - pull_request to main  → CI build
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: build release APK
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    # 避免 Secrets 缺失的 fork PR 跑失败 — PR 来自 fork 不一定能 push artifact/release
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ───────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # build-tools 36.1.0 + platform-tools + platforms;android-34
          # 与 android/gradle.properties 里的 android.kotlinVersion=1.9.25 + Java 17 对齐
          packages: |
            platform-tools
            platforms;android-34
            build-tools;36.1.0
          # cache-build-tools 在 runner 切换时减少下载时间

      - name: Make JDK 17 + Android SDK env available to Gradle
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          # Gradle daemon 跑在 CI 容器里，关掉防 OOM
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m" > ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties

      # ── Dependencies ────────────────────────────────────────────
      - name: Install Node deps
        run: npm ci --no-audit --no-fund
        # 注意：postinstall 会跑 `patch-package` 重新打 expo-modules-core 的 patch

      # ── Build ──────────────────────────────────────────────────
      - name: Run expo prebuild (idempotent — android/ 已 commit 也会被覆盖)
        # 如果你不想 prebuild 覆盖已 commit 的 android/，删掉这一步。
        # 当前 android/ 是 prebuild 出来的，我们让它重新生成以避免和 lockfile 漂移。
        run: npx expo prebuild --platform android --no-install --clean

      - name: Gradle assembleRelease
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          # signing 由 release.keystore base64 secret 注入（见 repo Settings → Secrets）
          # 如果 KEystore 没配，CI 仍然能跑，但会用 debug 签名（不推荐）
          MDREADER_RELEASE_KEYSTORE_BASE64: ${{ secrets.MDREADER_RELEASE_KEYSTORE_BASE64 }}
          MDREADER_RELEASE_KEY_ALIAS: ${{ secrets.MDREADER_RELEASE_KEY_ALIAS }}
          MDREADER_RELEASE_KEY_PASSWORD: ${{ secrets.MDREADER_RELEASE_KEY_PASSWORD }}
          MDREADER_RELEASE_STORE_PASSWORD: ${{ secrets.MDREADER_RELEASE_STORE_PASSWORD }}

      # ── Locate + upload APK ────────────────────────────────────
      - name: Find APK
        id: locate
        run: |
          APK=$(find android/app/build/outputs/apk/release -maxdepth 1 -name 'app-release.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No app-release.apk found"
            exit 1
          fi
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          echo "size=$(du -h "$APK" | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: ${{ steps.locate.outputs.apk }}
          if-no-files-found: error
          retention-days: 14

      # ── Release on tag ─────────────────────────────────────────
      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          # tag 名 v0.2.0 → versionName 0.2.0
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.locate.outputs.apk }}
            android/app/build/outputs/mapping/release/mapping.txt
            android/app/build/outputs/mapping/release/resources.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test: verify APK signature scheme
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # 用 apksigner 验证 release.keystore 签名
          APK="${{ steps.locate.outputs.apk }}"
          "$ANDROID_HOME/build-tools/36.1.0/apksigner" verify --verbose "$APK" | head -20

  # ── Lint / type-check (cheap, every PR) ─────────────────────
  lint:
    name: typecheck + lint
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit
      # ESLint 暂未配置 — 加上后用 `npm run lint`
